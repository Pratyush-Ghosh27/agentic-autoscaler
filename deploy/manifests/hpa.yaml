---
# Standard HPA for app-hpa. On hackathon-six we deliberately tune HPA
# for **production-typical cost efficiency** (averageValue=55, which
# corresponds to ~79% per-pod capacity utilisation) rather than the
# safety-margin target the AgenticAutoscaler uses (rpsPerPodMin=30,
# ~43% utilisation).
#
# Why this asymmetry exists (same rationale as hackathon-four): HPA in
# production is universally configured for cost (high utilisation)
# because HPA can only react, not predict — running at ~79% util means
# a 75% RPS bump (which is exactly what `varied.js`'s +180 RPS bursts
# deliver on top of the 240 RPS baseline) pushes pods well over 100%
# capacity and produces 503s during the ~90s HPA needs to detect-and-
# scale. The AgenticAutoscaler can afford lower utilisation because
# it forecasts demand 5 min ahead and pre-provisions; it doesn't need
# HPA's headroom budget.
#
#   per-pod capacity ≈ TARGET_CONCURRENCY / TARGET_WORK_DURATION
#                    ≈ 8 / 0.115s ≈ 70 RPS
#   averageValue=55 → ~79% utilisation at the target
#   AgenticAutoscaler stays at rpsPerPodMin=30 → ~43% utilisation
#
# Effect on the varied demo: HPA produces 503s during every one of the
# 47 burst onsets (baseline → baseline+180 over 20s, then a 50s hold
# longer than HPA's 60s stabilizationWindow). AAS retains its ~60%
# headroom and stays clean. The "predicted ≈ actual" Prophet narrative
# is unchanged because the actual traffic shape isn't altered — only
# HPA's *response* to it.
#
# To revert to the fair-comparison default (averageValue=30) used on
# hackathon and hackathon-two, see docs/hackathon/env-changes.md change
# #H6-3.
#
# Behavior policies match the AgenticAutoscaler's design defaults:
# 60s scale-up cooldown, 300s scale-down cooldown, +4 / -2 pods per minute.
#
# Note: the http_requests_per_second pod metric is provided by Prometheus
# Adapter (or kube-state-metrics custom resource); the kind cluster's
# kube-prometheus-stack ships with it disabled — see Plan #11 for adapter
# install steps. Without the adapter the HPA will report
# "FailedGetResourceMetric" and stay at minReplicas, which is acceptable
# for a controller-comparison demo.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: app-hpa
  namespace: demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: app-hpa
  minReplicas: 2
  # HACKATHON OVERRIDE: 10 -> 20. Kept in lock-step with
  # agenticautoscaler-sample.yaml so the AAS vs HPA comparison stays
  # apples-to-apples on the upper bound. See that file for the
  # diurnal SPIKE=500 / rpsPerPodMax=30 -> 17-pod-min math.
  maxReplicas: 20
  metrics:
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          # hackathon-six: 30 → 55 (production-typical cost-efficiency
          # target ≈ 79% utilisation). See file header for rationale.
          averageValue: "55"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          # HACKATHON OVERRIDE: bumped from 2 -> 4 to match AAS's
          # DEFAULT_MAX_STEP_SIZE=4 (which applies symmetrically up and
          # down). Keeps scale-down speed identical between the two
          # scalers so the comparison isolates forecast-lookahead.
          value: 4
          periodSeconds: 60
