---
# kube-prometheus-stack values tuned for a single-developer kind cluster.
# Heavy components disabled so the stack fits in ~1.5 GB. Production values
# (alertmanager + node-exporter + persistence) are out of scope for this
# project — the goal is reproducible local + CI runs, not a fleet rollout.

alertmanager:
  enabled: false

# kube-state-metrics is required: the Grafana dashboard's first panel
# ("Current Replicas — agentic vs HPA") queries kube_deployment_spec_replicas,
# which only kube-state-metrics produces. The earlier disable-to-save-RAM
# rationale doesn't apply — KSM idles at ~30 MB.
kubeStateMetrics:
  enabled: true

# When KSM is enabled by the kube-prometheus-stack chart, the bundled
# kube-state-metrics dependency runs in the `monitoring` namespace and
# emits metrics with `namespace=<thing-being-described>` (the natural
# label, e.g. `demo` for an app-agentic Deployment). The default scrape
# config rewrites that to `monitoring` (the namespace KSM itself is in)
# unless honorLabels is set. Without this, every dashboard query filtering
# on {namespace="demo"} for KSM-sourced series matches nothing.
kube-state-metrics:
  prometheus:
    monitor:
      honorLabels: true

nodeExporter:
  enabled: false

grafana:
  enabled: true
  # The sidecar watches for ConfigMaps with this label and auto-imports
  # any *.json file under data[*]. Paired with deploy/grafana/dashboard-configmap.yaml.
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
  persistence:
    enabled: false
  adminPassword: admin
  # Expose Grafana on the kind control-plane node at NodePort 30080 so
  # demos / VM-hosted clusters can reach it at http://<vm-ip>:30080
  # without `kubectl port-forward`. The matching port is pre-published
  # to the host by deploy/kind/cluster.yaml's extraPortMappings, so on
  # the VM itself Grafana is also reachable at http://localhost:30080.
  # NodePort 30080 is in the 30000-32767 range required by Kubernetes.
  service:
    type: NodePort
    port: 80
    targetPort: 3000
    nodePort: 30080

prometheus:
  prometheusSpec:
    # HACKATHON OVERRIDE: 2h -> 30h. The 2h default deletes every metric
    # older than 2 hours, which silently broke yesterday's Grafana panels
    # (and would make any multi-hour soak run pointless — by the time you
    # review it, only the most recent 2h of data still exists). 30h covers
    # a full 24h diurnal run plus 6h of slack so the dashboard is reviewable
    # the next morning. To restore: drop back to 2h.
    retention: 30h
    resources:
      requests:
        memory: 1Gi
      limits:
        # HACKATHON OVERRIDE: 1Gi -> 2Gi. With 30h of retained data plus
        # the working set for Grafana queries, the previous 1Gi limit
        # triggered OOMKills on long runs — which is the *other* way
        # yesterday's data disappeared (pod restart wiped the emptyDir
        # the StatefulSet was using). Now backed by a PVC (storageSpec
        # below), so a restart no longer loses data, but the larger
        # working set still needs the bump.
        memory: 2Gi
    # HACKATHON OVERRIDE: was {} (= emptyDir). Any Prometheus pod restart
    # (OOM, kind node restart, helm upgrade, kubelet eviction) wiped the
    # TSDB to zero on the previous config — the single most common cause
    # of "where did yesterday's Grafana panels go?". A real PVC backed
    # by kind's built-in local-path-provisioner (`standard` storageClass,
    # auto-installed by `kind create cluster`) survives every restart
    # short of `kind delete cluster`. 5Gi is ~25-50x headroom for 30h
    # of this workload's metric volume; the PVC binds lazily so it costs
    # nothing on disk until Prometheus actually writes to it.
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: standard
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    # By default kube-prometheus-stack only picks up PodMonitors and
    # ServiceMonitors that carry the `release: kube-prom` label and live
    # in the chart's namespace. We deliberately want target-app pods in
    # the `demo` namespace to be scraped without us having to label every
    # PodMonitor — so widen both selectors to match anything in any
    # namespace.
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
