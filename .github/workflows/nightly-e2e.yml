# ---------------------------------------------------------------------
# Nightly quantitative E2E.
#
# Runs the full agentic vs HPA comparison on a kind cluster. The
# previous version of this workflow installed Ollama and pulled a
# language model "for explanations", but the ExplainerWorker's Ollama
# adapter is never reachable from the runner-side install — the worker
# runs inside the kind cluster, expects OLLAMA_URL to point at an
# in-cluster service, and would have to talk back through the kind
# Docker network. None of that wiring exists, so every nightly was
# spending ~2-3 minutes downloading model weights for a code path that
# was never exercised. See docs/gap-report-v1.md G5.
#
# Failure here does *not* block PRs — it's a regression alarm; commits
# that introduce SLO regressions land green, and the next nightly run
# reports the regression with full controller/forecast logs uploaded.
# ---------------------------------------------------------------------
name: Nightly E2E

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      tolerance:
        description: "Tolerance multiplier for the agentic vs HPA comparison (default 1.10 — release-gate strict)"
        required: false
        default: "1.10"
      ramp_up_duration:
        description: "k6 ramp UP phase duration (default 5m)"
        required: false
        default: "5m"
      ramp_hold_duration:
        description: "k6 ramp HOLD phase duration (default 15m)"
        required: false
        default: "15m"
      ramp_down_duration:
        description: "k6 ramp DOWN phase duration (default 5m)"
        required: false
        default: "5m"

permissions:
  contents: read

env:
  GO_VERSION: "1.24"
  PYTHON_VERSION: "3.12"
  KIND_VERSION: "v0.24.0"
  HELM_VERSION: "v3.16.0"
  K6_VERSION: "v0.54.0"
  TOLERANCE: ${{ inputs.tolerance || '1.10' }}
  RAMP_UP_DURATION:   ${{ inputs.ramp_up_duration   || '5m'  }}
  RAMP_HOLD_DURATION: ${{ inputs.ramp_hold_duration || '15m' }}
  RAMP_DOWN_DURATION: ${{ inputs.ramp_down_duration || '5m'  }}

jobs:
  e2e:
    name: kind + helm + k6 + Prometheus assertions
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install kind
        run: |
          curl -fsSLo ./kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          chmod +x ./kind && sudo mv ./kind /usr/local/bin/

      - name: Install helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Install k6
        run: |
          curl -fsSL "https://github.com/grafana/k6/releases/download/${K6_VERSION}/k6-${K6_VERSION}-linux-amd64.tar.gz" \
            | tar xz --strip-components=1 -C /tmp
          sudo mv /tmp/k6 /usr/local/bin/k6
          k6 version

      - name: Install jq
        run: sudo apt-get install -y jq

      # ---- Build + deploy ----
      - name: Build images
        run: make images

      - name: Create kind cluster + load images
        run: |
          make kind-up
          make kind-load

      - name: Install Helm dependencies
        run: make install-deps

      - name: Deploy application stack
        run: make deploy

      - name: Wait for steady state
        run: |
          kubectl wait --for=condition=available deployment/agentic-autoscaler-controller-manager \
            -n agentic-autoscaler-system --timeout=180s
          kubectl wait --for=condition=available deployment/forecast-service \
            -n agentic-system --timeout=300s
          kubectl wait --for=condition=available deployment/app-agentic -n demo --timeout=120s
          kubectl wait --for=condition=available deployment/app-hpa     -n demo --timeout=120s
          echo "Sleeping 5m for classifier first-run + reconciler steady state..."
          sleep 300

      # ---- Drive load + assert ----
      #
      # The previous version of this step ran k6 on the runner host and
      # used `kubectl port-forward svc/...` to project the two target
      # Services onto localhost:8080/8081. That works as a connection
      # path but is *methodologically wrong* for an autoscaler comparison:
      # `kubectl port-forward svc/X` does not load-balance — it picks one
      # Endpoint at session start and pins all traffic to that one pod
      # for the session's lifetime (kubernetes/kubernetes#15180). With
      # 8 replicas behind a Service, 7 sit idle while 1 is crushed; the
      # HPA's per-pod RPS metric averages near zero and never scales,
      # both reconcilers bottleneck on the same single-pod path, and
      # their tail latencies + 5xx rates collapse to ~equal. The
      # comparison silently degrades from "agentic vs HPA" to
      # "single-pod-A vs single-pod-B".
      #
      # Running k6 as an in-cluster Job hits the Service ClusterIP
      # directly, so kube-proxy iptables rules randomly select an
      # Endpoint per connection and every replica carries its share.
      # See deploy/k6/run-incluster.sh for the full rationale.
      #
      # `--duration` is NOT passed: in k6 ≥ 0.50 a CLI duration flag
      # replaces the script's `scenarios:` block with a 1-VU default,
      # silently turning a 200-RPS ramping-arrival-rate scenario into
      # a 1-VU sequential loop. ramp.js drives its own duration via
      # the RAMP_*_DURATION env vars below.
      - name: Run k6 ramp scenario (in-cluster Job)
        run: |
          export RAMP_UP_DURATION RAMP_HOLD_DURATION RAMP_DOWN_DURATION
          bash deploy/k6/run-incluster.sh ramp

      - name: Quantitative assertions (p99 + 5xx)
        # WINDOW = the k6 *hold* phase (steady state) — we deliberately
        # exclude the noisy ramp-up/down windows from the latency and
        # error-rate comparison to keep the agentic-vs-HPA delta
        # apples-to-apples.
        run: TOLERANCE="${TOLERANCE}" WINDOW="${RAMP_HOLD_DURATION}" bash test/e2e/assertions.sh

      # ---- Failure artifacts ----
      - name: Collect failure artifacts
        if: failure()
        run: |
          mkdir -p artifacts
          kubectl logs -n agentic-autoscaler-system -l control-plane=controller-manager --tail=2000 > artifacts/controller-logs.txt || true
          kubectl logs -n agentic-system -l app=forecast-service --tail=1000 > artifacts/forecast-logs.txt || true
          kubectl logs -n demo -l app=app-agentic --tail=500 > artifacts/target-agentic-logs.txt || true
          kubectl logs -n demo -l app=app-hpa     --tail=500 > artifacts/target-hpa-logs.txt     || true
          kubectl get events -A --sort-by=.lastTimestamp > artifacts/events.txt || true
          kubectl get aas -A -o yaml > artifacts/aas.yaml || true
          kubectl get deploy -A -o wide > artifacts/deployments.txt || true
          kubectl get pods -A -o wide > artifacts/pods.txt || true
          kubectl describe deploy app-agentic -n demo > artifacts/describe-agentic.txt || true
          kubectl describe deploy app-hpa     -n demo > artifacts/describe-hpa.txt     || true

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: nightly-e2e-failure-artifacts
          path: artifacts/

      - name: Cleanup
        if: always()
        run: kind delete cluster --name agentic 2>/dev/null || true
