apiVersion: v1
kind: Namespace
metadata:
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: agentic-autoscaler
    app.kubernetes.io/managed-by: kustomize
  name: system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: agentic-autoscaler
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
    spec:
      # TODO(user): Uncomment the following code to configure the nodeAffinity expression
      # according to the platforms which are supported by your solution.
      # It is considered best practice to support multiple architectures. You can
      # build your manager image using the makefile target docker-buildx.
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #           - key: kubernetes.io/arch
      #             operator: In
      #             values:
      #               - amd64
      #               - arm64
      #               - ppc64le
      #               - s390x
      #           - key: kubernetes.io/os
      #             operator: In
      #             values:
      #               - linux
      securityContext:
        runAsNonRoot: true
        # TODO(user): For common cases that do not require escalating privileges
        # it is recommended to ensure that all your Pods/Containers are restrictive.
        # More info: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
        # Please uncomment the following code if your project does NOT have to work on old Kubernetes
        # versions < 1.19 or on vendors versions which do NOT support this field by default (i.e. Openshift < 4.11 ).
        # seccompProfile:
        #   type: RuntimeDefault
      containers:
      - command:
        - /manager
        args:
          - --leader-elect
          - --health-probe-bind-address=:8081
        image: controller:latest
        # IfNotPresent so kind/dev clusters use the locally-loaded image
        # rather than trying to pull `:latest` from a registry that
        # doesn't exist. In production, override IMG to a registry-tagged
        # immutable digest and policy becomes a non-issue.
        imagePullPolicy: IfNotPresent
        name: manager
        env:
          # Required (controller panics on startup if either is unset).
          # See docs/design_v2.md §4 for the full env-var inventory.
          #
          # The Service exposes port 80 (targeting the container's 8000);
          # see deploy/manifests/forecast-service.yaml. We omit the port
          # here so port 80 is implied — the previous explicit ":8000"
          # made every forecast call connection-refused, the controller
          # surfaced ForecastUnavailable Events, and predicted_rps was
          # never populated.
          - name: FORECAST_SERVICE_URL
            value: "http://forecast-service.agentic-system.svc"
          - name: PROMETHEUS_URL
            value: "http://kube-prom-kube-prometheus-prometheus.monitoring.svc:9090"
          # Optional — Ollama lives outside the cluster by default, so
          # in-cluster installs leave OLLAMA_URL unset (worker no-ops on
          # connection refused, see internal/explainer/worker.go).
          - name: OLLAMA_MODEL
            value: "llama3.2"
          # =====================================================
          # HACKATHON OVERRIDES (hackathon branch only)
          # =====================================================
          # All values below override code defaults in internal/config/
          # config.go for the June 2 hackathon submission. Goal: make
          # the controller engage faster on short k6 runs (10-25 min)
          # so the "predicted RPS approximately equal to actual RPS"
          # demo claim is visible within the scenario window.
          # Restore production defaults by deleting this block.
          #
          # Tier 1: hot-path responsiveness
          # 10 -> 3: first forecast call after 3 min instead of 10
          - name: HOT_PATH_MIN_POINTS
            value: "3"
          # HACKATHON-SIX OVERRIDE: 30 -> 45. The varied scenario is a
          # continuously-moving compound wave (17/60/240-min sinusoids)
          # rather than discrete 35-min phases. Prophet's trend +
          # changepoint fit needs enough context to see ~3 full fast-
          # wave cycles (3 × 17min = 51min) and ~¾ of one mid-wave
          # (60min) so the per-iteration model isn't dominated by a
          # single phase of the fastest oscillator. 45 min is the
          # smallest window that comfortably covers both. Still well
          # above PROPHET_MIN_POINTS=15. Was 30 on hackathon-two (sized
          # for 35-min discrete phases there).
          - name: HOT_PATH_HISTORY_MINUTES
            value: "45"
          # 60 -> 30: 2x more reconcile cycles per minute. Trades a
          # small bump in Prometheus + forecast-service load for much
          # finer-grained scaling decisions.
          - name: RECONCILE_INTERVAL_SECONDS
            value: "30"
          # Tier 2: classifier engages within the demo window
          # 72 -> 22 (the validation floor at default resolution=5).
          # First classification arrives at ~22 min instead of ~72.
          - name: CLASSIFIER_MIN_POINTS
            value: "22"
          # 30 -> 5: classifier worker re-runs 6x more often, so a
          # 20-min scenario sees 4 classifications instead of zero.
          - name: CLASSIFIER_INTERVAL_MINUTES
            value: "5"
          # HACKATHON-SIX OVERRIDE: 2 -> 4. The varied scenario's
          # slowest sinusoidal component has a 4-hour period; the
          # classifier wants to see at least one full slow-drift cycle
          # to characterise the workload stably (so it doesn't flip
          # PatternFlat ↔ PatternGradualRamp twice per cycle). 4h at
          # default CONTEXT_DOWNSAMPLE_RESOLUTION_MIN=5 returns
          # 4*60/5 = 48 samples, well above the 22-point
          # CLASSIFIER_MIN_POINTS floor. PROPHET_USE_HOURLY_REGRESSOR
          # remains off (see forecast-service.yaml) because the
          # 17/60/240-min periods don't align with hour-of-day either.
          # Was 2h on hackathon-two (sized for 2h28min rotating cycle).
          - name: CLASSIFIER_HISTORY_HOURS
            value: "4"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        # TODO(user): Configure the resources accordingly based on the project requirements.
        # More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
