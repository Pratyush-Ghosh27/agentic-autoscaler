---
# Forecast Service: Python/FastAPI service serving /recommend.
# Memory limits sized for Prophet's compiled Stan models (kept in process
# memory after the warm-up fit) — see forecast-service/Dockerfile and
# Plan #7 for the warm-up rationale.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forecast-service
  namespace: agentic-system
  labels:
    app: forecast-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forecast-service
  template:
    metadata:
      labels:
        app: forecast-service
    spec:
      containers:
        - name: forecast-service
          image: forecast-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: FORECAST_HORIZON_MINUTES
              value: "10"
            - name: PROPHET_MIN_POINTS
              value: "60"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          # Warm-up takes ~25s on first start, so initialDelaySeconds is
          # generous; once warm, /healthz returns instantly.
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: forecast-service
  namespace: agentic-system
  labels:
    app: forecast-service
spec:
  selector:
    app: forecast-service
  ports:
    - port: 80
      targetPort: http
      name: http
