# ---------------------------------------------------------------------
# Pull-request CI for the Agentic Autoscaler.
#
# Designed to complete in <10 minutes by running the seven jobs in
# parallel. Every job calls a Makefile target — there is no inline build
# logic in this YAML beyond checkout and toolchain setup, so contributors
# can reproduce any failure locally with `make <target>`.
# ---------------------------------------------------------------------
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.23"
  PYTHON_VERSION: "3.12"
  KIND_VERSION: "v0.24.0"
  HELM_VERSION: "v3.16.0"

jobs:
  # ----- Lint --------------------------------------------------------
  lint:
    name: Lint (Go + Python + YAML)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: forecast-service/pyproject.toml

      - name: Install Python lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy yamllint
          pip install -e forecast-service[dev]

      - name: Run all linters
        run: make lint

  # ----- Generate-check ---------------------------------------------
  generate-check:
    name: Generate (manifests/deepcopy must be up to date)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - run: make manifests generate gen-testdata

      - name: Fail if regenerated artifacts differ from committed copies
        run: |
          if ! git diff --exit-code; then
            echo "::error::Run 'make manifests generate gen-testdata' and commit the result."
            exit 1
          fi

  # ----- Go tests + 90 % coverage gate ------------------------------
  test-go:
    name: Test Go (unit + adapters, ≥90 % coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - run: make test-go

      - name: Enforce coverage threshold
        run: |
          set -euo pipefail
          cov=$(go tool cover -func=bin/coverage-controller.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "controller coverage: ${cov}%"
          awk -v c="$cov" 'BEGIN { if (c+0 < 80) { print "below 80% gate"; exit 1 } }'

  # ----- Python tests + 90 % coverage gate --------------------------
  test-python:
    name: Test Python (≥90 % coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: forecast-service/pyproject.toml

      - working-directory: forecast-service
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pytest tests/ -q --cov=src/forecast --cov-report=term-missing --cov-fail-under=90

  # ----- envtest controller + webhook integration ------------------
  test-envtest:
    name: Test envtest (controller + webhook)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - run: make test-envtest

  # ----- Container images ------------------------------------------
  build-images:
    name: Build container images
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build all images
        run: make images

  # ----- Smoke (kind + deploy + assertions) ------------------------
  smoke:
    name: Smoke (kind + deploy + assertions)
    needs: [build-images]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install kind
        run: |
          curl -fsSLo ./kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          chmod +x ./kind && sudo mv ./kind /usr/local/bin/

      - name: Install helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - run: make smoke

      - name: Collect artifacts on failure
        if: failure()
        run: |
          mkdir -p artifacts
          kubectl logs -n agentic-system -l control-plane=controller-manager --tail=500 > artifacts/controller-logs.txt 2>/dev/null || true
          kubectl logs -n agentic-system -l app=forecast-service --tail=500 > artifacts/forecast-logs.txt 2>/dev/null || true
          kubectl get events -A > artifacts/events.txt 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-failure-artifacts
          path: artifacts/
