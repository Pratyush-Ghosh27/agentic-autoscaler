apiVersion: v1
kind: Namespace
metadata:
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: agentic-autoscaler
    app.kubernetes.io/managed-by: kustomize
  name: system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: agentic-autoscaler
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
    spec:
      # TODO(user): Uncomment the following code to configure the nodeAffinity expression
      # according to the platforms which are supported by your solution.
      # It is considered best practice to support multiple architectures. You can
      # build your manager image using the makefile target docker-buildx.
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #           - key: kubernetes.io/arch
      #             operator: In
      #             values:
      #               - amd64
      #               - arm64
      #               - ppc64le
      #               - s390x
      #           - key: kubernetes.io/os
      #             operator: In
      #             values:
      #               - linux
      securityContext:
        runAsNonRoot: true
        # TODO(user): For common cases that do not require escalating privileges
        # it is recommended to ensure that all your Pods/Containers are restrictive.
        # More info: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
        # Please uncomment the following code if your project does NOT have to work on old Kubernetes
        # versions < 1.19 or on vendors versions which do NOT support this field by default (i.e. Openshift < 4.11 ).
        # seccompProfile:
        #   type: RuntimeDefault
      containers:
      - command:
        - /manager
        args:
          - --leader-elect
          - --health-probe-bind-address=:8081
        image: controller:latest
        # IfNotPresent so kind/dev clusters use the locally-loaded image
        # rather than trying to pull `:latest` from a registry that
        # doesn't exist. In production, override IMG to a registry-tagged
        # immutable digest and policy becomes a non-issue.
        imagePullPolicy: IfNotPresent
        name: manager
        env:
          # Required (controller panics on startup if either is unset).
          # See docs/design_v2.md §4 for the full env-var inventory.
          #
          # The Service exposes port 80 (targeting the container's 8000);
          # see deploy/manifests/forecast-service.yaml. We omit the port
          # here so port 80 is implied — the previous explicit ":8000"
          # made every forecast call connection-refused, the controller
          # surfaced ForecastUnavailable Events, and predicted_rps was
          # never populated.
          - name: FORECAST_SERVICE_URL
            value: "http://forecast-service.agentic-system.svc"
          - name: PROMETHEUS_URL
            value: "http://kube-prom-kube-prometheus-prometheus.monitoring.svc:9090"
          # Optional — Ollama lives outside the cluster by default, so
          # in-cluster installs leave OLLAMA_URL unset (worker no-ops on
          # connection refused, see internal/explainer/worker.go).
          - name: OLLAMA_MODEL
            value: "llama3.2"
          # =====================================================
          # HACKATHON OVERRIDES (hackathon branch only)
          # =====================================================
          # All values below override code defaults in internal/config/
          # config.go for the June 2 hackathon submission. Goal: make
          # the controller engage faster on short k6 runs (10-25 min)
          # so the "predicted RPS approximately equal to actual RPS"
          # demo claim is visible within the scenario window.
          # Restore production defaults by deleting this block.
          #
          # Tier 1: hot-path responsiveness
          # 10 -> 3: first forecast call after 3 min instead of 10
          - name: HOT_PATH_MIN_POINTS
            value: "3"
          # HACKATHON-FIVE OVERRIDE: 30 -> 60. The schedule scenario
          # holds each hour-of-day at a sustained RPS level, so the
          # forecaster's trend estimate benefits from seeing the full
          # hour rather than 30 min (which on this scenario would
          # include the previous hour's transient at the start of
          # every wall-clock hour). 60 also makes the hot-path window
          # cover one full "hour bucket" that the classifier emits
          # into hourly_profile, keeping the trend slope estimate and
          # the regressor's input feature on the same time axis.
          # (Previous hackathon-two value 30 was tuned for the
          # rotating-loop's 35-min-per-scenario cycle and is wrong
          # for hour-aligned traffic.)
          - name: HOT_PATH_HISTORY_MINUTES
            value: "60"
          # 60 -> 30: 2x more reconcile cycles per minute. Trades a
          # small bump in Prometheus + forecast-service load for much
          # finer-grained scaling decisions.
          - name: RECONCILE_INTERVAL_SECONDS
            value: "30"
          # Tier 2: classifier engages within the demo window
          # 72 -> 22 (the validation floor at default resolution=5).
          # First classification arrives at ~22 min instead of ~72.
          - name: CLASSIFIER_MIN_POINTS
            value: "22"
          # 30 -> 5: classifier worker re-runs 6x more often, so a
          # 20-min scenario sees 4 classifications instead of zero.
          - name: CLASSIFIER_INTERVAL_MINUTES
            value: "5"
          # HACKATHON-FIVE OVERRIDE: 2 -> 25. The schedule scenario
          # uses a 24-hour repeating hourly profile, and the entire
          # demo claim depends on the classifier populating all 24
          # hourly_profile bins so Prophet's hour_baseline regressor
          # can pre-empt every hour-boundary transition.
          # HOURLY_PROFILE_MIN_HOURS=12 (forecast-service default)
          # means at least 12 distinct UTC hours must be covered by
          # this window before hourly_profile_valid flips true; the
          # full 24-bin profile requires all 24 hours, so 25h gives
          # 1h of slack for stragglers near rollover. Larger values
          # would just include more stale samples without helping.
          # (Previous hackathon-two value 2 was tuned for the
          # rotating-loop's 2h28min cycle.)
          - name: CLASSIFIER_HISTORY_HOURS
            value: "25"
          # HACKATHON-FIVE-24H OVERRIDE: 12 -> 4. The user's wall-clock
          # budget for the demo is 24h, not 48h, so we can't wait the
          # full day-1-warmup-then-day-2-money-cycle pattern that the
          # default min-hours=12 enforces (regressor flips valid at
          # hour 12 with partial profile; full 24 bins populated only
          # at hour 24, leaving no time inside a 24h demo to actually
          # USE the populated profile).
          #
          # Dropping to 4 makes the classifier emit hourly_profile_valid
          # =true after just 4 distinct UTC hours of observation. The
          # other 20 bins are interpolated from neighbour samples (see
          # internal/classifier/pipeline.go ComputeHourlyProfile). The
          # interpolation is mathematically correct but predictively
          # weak for never-seen hours; what matters is that the hours
          # already observed produce ACCURATE per-hour medians, and
          # those bins THEN drive accurate hour_baseline regressor
          # predictions for upcoming repeats of the same hour-of-day
          # within the same demo run.
          #
          # Combined with hackathon-four's HPA cost-tightening (see
          # deploy/manifests/hpa.yaml averageValue=50), this gives:
          #   hour 0-4 : structural 503 gap only (~3-10×)
          #   hour 4-24: structural + partial-regressor (~5-15×)
          # Without the cost-tightening fallback, hour 0-4 would
          # collapse to 1× and the demo's first quarter would look
          # flat — same failure mode users reported on rotating-loop.
          #
          # Range validated to [1, 24] in internal/config/config.go;
          # 4 is within bounds and exercised by the existing
          # TestValidate_RejectsBadHourlyProfileMinHours coverage.
          - name: HOURLY_PROFILE_MIN_HOURS
            value: "4"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        # TODO(user): Configure the resources accordingly based on the project requirements.
        # More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
