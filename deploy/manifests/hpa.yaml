---
# Standard HPA for app-hpa. On hackathon-seven we deliberately tune HPA
# and the AgenticAutoscaler to the **same per-pod target** so the
# comparison is fair on the tuning dimension. Any residual 503-rate
# gap that remains is purely the consequence of reaction model
# (HPA reactive vs AAS predictive), not of unequal headroom.
#
#   per-pod capacity ≈ TARGET_CONCURRENCY / TARGET_WORK_DURATION
#                    ≈ 8 / 0.115s ≈ 70 RPS
#   averageValue=40 → ~57% utilisation at target
#   AgenticAutoscaler matches with rpsPerPodMin=40 → ~57% utilisation
#
# Both scalers therefore have identical static headroom (~30 RPS/pod,
# or ~43% slack from their target). HPA will still produce 503s during
# the 60-90s detection-and-scale window after a transition because that
# window exists regardless of how the target is tuned; AAS pre-scales
# 5 min ahead so its same headroom is never tested. THIS is the
# experiment the demo isolates.
#
# Why this is different from hackathon-four:
# - hackathon-four had averageValue=50 (71% util) vs AAS=30 (43%);
#   AAS had 2x the absolute headroom by tuning alone, before any
#   forecaster did any work. That confounded forecaster vs tuning.
# - hackathon-seven equalises the target so only the forecaster matters.
#
# To restore the asymmetric hackathon-four tuning: set averageValue
# back to "50" here and rpsPerPodMin/Max back to 30/31 in
# agenticautoscaler-sample.yaml.
#
# Behavior policies match the AgenticAutoscaler's design defaults:
# 60s scale-up cooldown, 300s scale-down cooldown, +4 / -4 pods per minute.
#
# Note: the http_requests_per_second pod metric is provided by Prometheus
# Adapter (or kube-state-metrics custom resource); the kind cluster's
# kube-prometheus-stack ships with it disabled — see Plan #11 for adapter
# install steps. Without the adapter the HPA will report
# "FailedGetResourceMetric" and stay at minReplicas, which is acceptable
# for a controller-comparison demo.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: app-hpa
  namespace: demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: app-hpa
  minReplicas: 2
  # HACKATHON OVERRIDE: 10 -> 20. Kept in lock-step with
  # agenticautoscaler-sample.yaml so the AAS vs HPA comparison stays
  # apples-to-apples on the upper bound. See that file for the
  # diurnal SPIKE=500 / rpsPerPodMax=30 -> 17-pod-min math.
  maxReplicas: 20
  metrics:
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          # hackathon-seven: 50 → 40 (matched with AAS rpsPerPodMin=40).
          # Equal per-pod targets across both scalers ⇒ identical static
          # headroom ⇒ residual 503-rate gap isolates the forecaster's
          # contribution. See file header for rationale.
          averageValue: "40"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          # HACKATHON OVERRIDE: bumped from 2 -> 4 to match AAS's
          # DEFAULT_MAX_STEP_SIZE=4 (which applies symmetrically up and
          # down). Keeps scale-down speed identical between the two
          # scalers so the comparison isolates forecast-lookahead.
          value: 4
          periodSeconds: 60
