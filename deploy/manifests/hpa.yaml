---
# Standard HPA for app-hpa. On hackathon-four we deliberately tune HPA
# for **production-typical cost efficiency** (averageValue=50, which
# corresponds to ~71% per-pod capacity utilisation) rather than the
# safety-margin target the AgenticAutoscaler uses (rpsPerPodMin=30,
# ~43% utilisation).
#
# Why this asymmetry exists: it mirrors how HPA is tuned in production.
# HPA users universally configure for cost (high utilisation) because
# HPA can only react, not predict — running at ~71% util means a 50%
# RPS bump pushes pods to ~107% capacity and produces 503s during the
# ~90s HPA needs to detect-and-scale. The AgenticAutoscaler can afford
# lower utilisation because it forecasts demand 5 min ahead and pre-
# provisions; it doesn't need the headroom budget HPA does.
#
#   per-pod capacity ≈ TARGET_CONCURRENCY / TARGET_WORK_DURATION
#                    ≈ 8 / 0.115s ≈ 70 RPS
#   averageValue=50 → ~71% utilisation at target
#   AgenticAutoscaler stays at rpsPerPodMin=30 → ~43% utilisation
#
# Effect on the rotating/diurnal demos: HPA produces 503s during every
# upward RPS transition (steady→ramp, ramp→spiky on rotating; trough→
# morning, lunch spike on diurnal). AAS retains its ~60% headroom and
# stays clean. The "predicted ≈ actual" Prophet narrative is unchanged
# because the actual traffic shape isn't altered — only HPA's *response*
# to it.
#
# To revert to the fair-comparison default (averageValue=30) used on
# hackathon and hackathon-two, see docs/hackathon/env-changes.md
# change #20.
#
# Behavior policies match the AgenticAutoscaler's design defaults:
# 60s scale-up cooldown, 300s scale-down cooldown, +4 / -4 pods per minute.
#
# Note: the http_requests_per_second pod metric is provided by Prometheus
# Adapter (or kube-state-metrics custom resource); the kind cluster's
# kube-prometheus-stack ships with it disabled — see Plan #11 for adapter
# install steps. Without the adapter the HPA will report
# "FailedGetResourceMetric" and stay at minReplicas, which is acceptable
# for a controller-comparison demo.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: app-hpa
  namespace: demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: app-hpa
  minReplicas: 2
  # HACKATHON OVERRIDE: 10 -> 20. Kept in lock-step with
  # agenticautoscaler-sample.yaml so the AAS vs HPA comparison stays
  # apples-to-apples on the upper bound. See that file for the
  # diurnal SPIKE=500 / rpsPerPodMax=30 -> 17-pod-min math.
  maxReplicas: 20
  metrics:
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          # hackathon-four: 30 → 50 (production-typical cost-efficiency
          # target ≈ 71% utilisation). See file header for rationale.
          averageValue: "50"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          # HACKATHON OVERRIDE: bumped from 2 -> 4 to match AAS's
          # DEFAULT_MAX_STEP_SIZE=4 (which applies symmetrically up and
          # down). Keeps scale-down speed identical between the two
          # scalers so the comparison isolates forecast-lookahead.
          value: 4
          periodSeconds: 60
