---
# Forecast Service: Python/FastAPI service serving /recommend.
# Memory limits sized for Prophet's compiled Stan models (kept in process
# memory after the warm-up fit) — see forecast-service/Dockerfile and
# Plan #7 for the warm-up rationale.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forecast-service
  namespace: agentic-system
  labels:
    app: forecast-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forecast-service
  template:
    metadata:
      labels:
        app: forecast-service
    spec:
      containers:
        - name: forecast-service
          image: forecast-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            # HACKATHON OVERRIDE: 10 -> 5 to halve forecast-vs-actual
            # error (autocorrelation decays with horizon). System still
            # has ~4 min of lookahead headroom before pod-startup,
            # cooldowns, and reaction time consume the window.
            - name: FORECAST_HORIZON_MINUTES
              value: "5"
            # HACKATHON OVERRIDE: 60 -> 15 so the auto-dispatch path
            # switches to Prophet within ~15 min of a fresh demo run
            # instead of ~60 min. Keeps the majority of a 25-min k6
            # scenario on Prophet rather than linear_extrap.
            - name: PROPHET_MIN_POINTS
              value: "15"
            # HACKATHON ADDITION: 10 -> 5 makes linear_extrap (the cold
            # forecaster used in the first ~15 min) more reactive to
            # recent slope, less smoothed by stale history.
            - name: LINEAR_EXTRAP_WINDOW_MINUTES
              value: "5"
            # HACKATHON ADDITION: 30 -> 10 lets gbdt_quantile engage at
            # ~15 min instead of ~40. Only fires when an AAS CR pins
            # spec.preferredForecaster: gbdt_quantile.
            - name: GBDT_MIN_POINTS
              value: "10"
            # HACKATHON-FIVE OVERRIDE: re-enabled (hackathon-two had
            # disabled this because the rotating-loop's 2h28min cycle
            # period made the per-hour median meaningless). The
            # schedule scenario REQUIRES this regressor — it's the
            # ONLY mechanism by which Prophet can anticipate the
            # sharp hour-boundary transitions and pre-scale AAS
            # before HPA gets caught. See
            # docs/hackathon/schedule-503-demo.md and the design
            # comment block in k6/scenarios/schedule.js for the full
            # mechanism walkthrough.
            # NOTE: hour_baseline is silently ignored when the
            # context's hourly_profile_valid==false, which is the
            # case for rotating/diurnal/stress runs that don't
            # complete a full 24h before forecaster invocation.
            # Re-enabling here is therefore a no-op for those
            # scenarios; only the new `schedule` scenario benefits.
            - name: PROPHET_USE_HOURLY_REGRESSOR
              value: "true"
            # HACKATHON-FIVE-24H OVERRIDE: 12 -> 4. Mirrors the
            # controller-side HOURLY_PROFILE_MIN_HOURS (see
            # config/manager/manager.yaml) so the service's
            # context-validation sanity check stays in lock-step.
            # The controller is where the flip actually happens
            # (it stamps hourly_profile_valid into the request
            # context based on its own setting); the service uses
            # this value only as a mirrored cross-check (per
            # forecast-service/tests/integration/test_app.py "G11:
            # mirrored on the service for context validation").
            # Drift between the two would cause the service to
            # reject contexts the controller considers valid.
            # Rationale for choosing 4 is documented at length in
            # the controller manifest; tl;dr: 24h demo budget needs
            # the regressor active well before hour 12.
            - name: HOURLY_PROFILE_MIN_HOURS
              value: "4"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          # Warm-up takes ~25s on first start, so initialDelaySeconds is
          # generous; once warm, /healthz returns instantly.
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: forecast-service
  namespace: agentic-system
  labels:
    app: forecast-service
spec:
  selector:
    app: forecast-service
  ports:
    - port: 80
      targetPort: http
      name: http
