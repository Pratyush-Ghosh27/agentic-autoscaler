---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-autoscaling-agentic-io-v1alpha1-agenticautoscaler
  failurePolicy: Fail
  name: vagenticautoscaler-v1alpha1.kb.io
  rules:
  - apiGroups:
    - autoscaling.agentic.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - agenticautoscalers
  sideEffects: None
