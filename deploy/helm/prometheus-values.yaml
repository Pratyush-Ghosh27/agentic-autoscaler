---
# kube-prometheus-stack values tuned for a single-developer kind cluster.
# Heavy components (alertmanager, node-exporter) are disabled so the stack
# fits in ~2 GB. Prometheus uses a small PVC and 30h retention so multi-
# hour scenario runs remain reviewable the next morning — see the
# `prometheus.prometheusSpec` block below. The goal is reproducible local
# + CI runs that survive a kind node restart, not a fleet rollout.

alertmanager:
  enabled: false

# kube-state-metrics is required: the Grafana dashboard's first panel
# ("Current Replicas — agentic vs HPA") queries kube_deployment_spec_replicas,
# which only kube-state-metrics produces. The earlier disable-to-save-RAM
# rationale doesn't apply — KSM idles at ~30 MB.
kubeStateMetrics:
  enabled: true

# When KSM is enabled by the kube-prometheus-stack chart, the bundled
# kube-state-metrics dependency runs in the `monitoring` namespace and
# emits metrics with `namespace=<thing-being-described>` (the natural
# label, e.g. `demo` for an app-agentic Deployment). The default scrape
# config rewrites that to `monitoring` (the namespace KSM itself is in)
# unless honorLabels is set. Without this, every dashboard query filtering
# on {namespace="demo"} for KSM-sourced series matches nothing.
kube-state-metrics:
  prometheus:
    monitor:
      honorLabels: true

nodeExporter:
  enabled: false

grafana:
  enabled: true
  # The sidecar watches for ConfigMaps with this label and auto-imports
  # any *.json file under data[*]. Paired with deploy/grafana/dashboard-configmap.yaml.
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
  persistence:
    enabled: false
  adminPassword: admin
  # Expose Grafana on the kind control-plane node at NodePort 30080 so
  # demos / VM-hosted clusters can reach it at http://<vm-ip>:30080
  # without `kubectl port-forward`. The matching port is pre-published
  # to the host by deploy/kind/cluster.yaml's extraPortMappings, so on
  # the VM itself Grafana is also reachable at http://localhost:30080.
  # NodePort 30080 is in the 30000-32767 range required by Kubernetes.
  service:
    type: NodePort
    port: 80
    targetPort: 3000
    nodePort: 30080

prometheus:
  prometheusSpec:
    # 30h retention so multi-hour scenarios (k6 ramp/steady/spiky/bursty)
    # and overnight soak runs remain reviewable the next morning. The
    # previous 2h value silently deleted everything older than two hours
    # regardless of pod state — a 25-min ramp recorded at 9 PM was gone
    # by 11 PM, and any post-run debugging had to be done within the
    # 2-hour window or not at all. 30h also gives the classifier and
    # Prophet's `hourly_profile` regressor (HOURLY_PROFILE_MIN_HOURS=12)
    # enough wall-clock history to actually engage.
    retention: 30h
    resources:
      requests:
        memory: 1Gi
      limits:
        # 2Gi to comfortably hold ~30h of this stack's metric volume
        # plus Grafana's query working set. The previous 1Gi limit OOM-
        # killed the pod under sustained Grafana traffic on long runs,
        # which combined with the emptyDir below (now fixed) was a
        # second silent way historical data disappeared.
        memory: 2Gi
    # PVC-backed storage so Prometheus pod restarts (OOMKills, kind node
    # restarts, helm upgrades, kubelet evictions) no longer wipe the
    # TSDB. The previous `storageSpec: {}` resolved to an emptyDir, which
    # is the single most common cause of "where did yesterday's Grafana
    # data go?". Kind ships with `local-path-provisioner` and a default
    # `standard` storageClass (auto-installed by `kind create cluster`),
    # so this is zero-config on the project's reference cluster. 5Gi is
    # ~25-50x headroom for the workload's metric volume at 30h retention;
    # the PVC binds lazily so it costs nothing on disk until Prometheus
    # writes to it.
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: standard
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    # By default kube-prometheus-stack only picks up PodMonitors and
    # ServiceMonitors that carry the `release: kube-prom` label and live
    # in the chart's namespace. We deliberately want target-app pods in
    # the `demo` namespace to be scraped without us having to label every
    # PodMonitor — so widen both selectors to match anything in any
    # namespace.
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
