---
# 3-node kind cluster: 1 control-plane + 2 workers.
#
# extraPortMappings publish the control-plane node's NodePort 30080 to the
# host's port 30080. Grafana's Service (deploy/helm/prometheus-values.yaml,
# grafana.service) pins itself to NodePort 30080, so on the VM running this
# kind cluster Grafana is permanently reachable at http://localhost:30080
# (or http://<vm-ip>:30080 from elsewhere) with no `kubectl port-forward`
# needed — survives SSH disconnects, VM session resumes, etc.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
  - role: worker
  - role: worker
