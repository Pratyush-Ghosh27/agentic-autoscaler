---
# In-cluster k6 load-generation Job.
#
# Drives traffic against both `app-agentic` and `app-hpa` Services from
# inside the cluster, so kube-proxy load-balances across all replicas of
# each Deployment. This is the only way the agentic vs HPA comparison
# is methodologically valid — `kubectl port-forward svc/X` from outside
# the cluster pins all traffic to a single Endpoint for the session's
# lifetime (kubernetes/kubernetes#15180), which silently invalidates
# every replica-count-based scaling decision the comparison is meant to
# evaluate.
#
# Parameterised via envsubst by the deploy/k6/run-incluster.sh wrapper.
# The wrapper sets defaults for every variable substituted here, then
# invokes envsubst with an explicit whitelist so the in-pod shell
# script's $TARGET_AGENTIC_URL / $TARGET_HPA_URL references (which need
# to be resolved at container start, not template-render time) pass
# through unchanged.
#
# Hackathon-four long-run hardening (the rotating scenario stopped
# after one cycle on hackathon-two; this template was the root cause
# in all but one of the failure modes — see commit message for the
# full enumeration). The four spec-level hardenings here are:
#
#   - resources.requests == resources.limits  → Guaranteed QoS class,
#     immune to kubelet eviction by memory pressure.
#   - resources.limits.memory = 2Gi (was 512Mi) → covers 24h of k6's
#     internal metric buffers + the 1,590-stage rotating schedule
#     without OOMKill. k6 metric buffer growth is ~50MB/h at 200 RPS;
#     512Mi was eaten in ~6h of a 23h20m run, which matches the
#     reported "stopped after one cycle ≈ 140 min plus warmup".
#   - ttlSecondsAfterFinished = 86400 (was 600) → failed Pod is still
#     present for `kubectl describe` and `kubectl logs --previous` the
#     next morning. The previous 10-minute TTL was why the user
#     observed "the Job just disappeared" — Kubernetes was working
#     as configured; the configuration was wrong for long runs.
#   - terminationGracePeriodSeconds = 300 (was default 30) → k6 has
#     time to flush metrics and drain VUs cleanly when the wrapper
#     issues `kubectl delete`. Avoids spurious SIGKILL exit codes
#     that trigger `backoffLimit` retry logic.
#
# `backoffLimit: 0` is preserved deliberately. For long-running
# scenarios (rotating, diurnal, stress), a retry restarts from cycle 0,
# which:
#   1. Confounds the timeline of any downstream Prometheus analysis
#      (Grafana panels show two superimposed runs).
#   2. Wastes the 23h of clock time the failed run consumed.
#   3. Doesn't fix the root cause — if the Pod OOMKilled at cycle 8,
#      the retry will OOMKill at cycle 8 too.
# A flaky run is a regression signal, not noise to be smoothed away.
# If a retry is genuinely needed, re-run `make k6-incluster-rotating`
# manually after fixing the underlying cause.
#
# k6 image pin: grafana/k6:0.54.0 matches the K6_VERSION used in the
# nightly workflow. Bump both together.
apiVersion: batch/v1
kind: Job
metadata:
  name: k6-${SCENARIO}
  namespace: demo
  labels:
    app: k6
    scenario: ${SCENARIO}
spec:
  backoffLimit: 0
  # 24h Pod retention after terminal state. Was 600s (10 min), which
  # quietly garbage-collected the Pod before anyone could inspect why
  # the rotating run died. See file header.
  ttlSecondsAfterFinished: 86400
  # activeDeadlineSeconds is intentionally NOT set: with backoffLimit=0
  # we own termination via the wrapper's polling loop + per-scenario
  # TIMEOUT. Setting it here too would create two independent kill
  # paths that have to be kept in sync forever.
  template:
    metadata:
      labels:
        app: k6
        scenario: ${SCENARIO}
    spec:
      restartPolicy: Never
      # Allow k6 5 minutes to flush metric buffers + drain in-flight
      # VUs when the wrapper issues a delete. Default is 30s which
      # frequently SIGKILLs k6 mid-flush at 200+ RPS.
      terminationGracePeriodSeconds: 300
      containers:
        - name: k6
          image: grafana/k6:0.54.0
          imagePullPolicy: IfNotPresent
          # Capture k6's exit code explicitly so the "done" marker
          # always lands on stdout, even on threshold-trip exit. The
          # previous `set -e` aborted the script before the echo,
          # making it impossible to tell from a kubectl logs tail
          # whether the run completed-with-failures or was killed
          # externally. The TARGET_*_URL refs below are deliberately
          # NOT in the envsubst whitelist — they're resolved at
          # container start as Pod-level env vars.
          command:
            - /bin/sh
            - -c
            - |
              echo "==> k6 ${SCENARIO} starting"
              echo "    TARGET_AGENTIC_URL=$TARGET_AGENTIC_URL"
              echo "    TARGET_HPA_URL=$TARGET_HPA_URL"
              k6 run --no-summary --no-color /scripts/scenarios/${SCENARIO}.js
              rc=$?
              echo "==> k6 ${SCENARIO} done (exit=${rc})"
              exit ${rc}
          env:
            # Cluster-internal Service DNS — kube-proxy load-balances
            # across all ready Endpoints behind each ClusterIP.
            - name: TARGET_AGENTIC_URL
              value: "http://app-agentic.demo.svc.cluster.local"
            - name: TARGET_HPA_URL
              value: "http://app-hpa.demo.svc.cluster.local"
            # Per-scenario tunables. The wrapper script sets a default
            # for each before calling envsubst; envsubst doesn't
            # support shell `${VAR:-default}` syntax so the wrapper is
            # the only source of defaults.
            - name: RAMP_UP_DURATION
              value: "${RAMP_UP_DURATION}"
            - name: RAMP_HOLD_DURATION
              value: "${RAMP_HOLD_DURATION}"
            - name: RAMP_DOWN_DURATION
              value: "${RAMP_DOWN_DURATION}"
            - name: RAMP_RPS_PEAK
              value: "${RAMP_RPS_PEAK}"
            - name: STEADY_RPS
              value: "${STEADY_RPS}"
            - name: STEADY_DURATION
              value: "${STEADY_DURATION}"
            - name: SPIKE_BASE_RPS
              value: "${SPIKE_BASE_RPS}"
            - name: SPIKE_PEAK_RPS
              value: "${SPIKE_PEAK_RPS}"
            - name: SPIKE_INTERVAL
              value: "${SPIKE_INTERVAL}"
            - name: SPIKE_DURATION
              value: "${SPIKE_DURATION}"
            - name: SPIKY_TOTAL_DURATION
              value: "${SPIKY_TOTAL_DURATION}"
            - name: BURST_SIZE
              value: "${BURST_SIZE}"
            - name: BURST_MIN_INTERVAL
              value: "${BURST_MIN_INTERVAL}"
            - name: BURST_MAX_INTERVAL
              value: "${BURST_MAX_INTERVAL}"
            - name: BURSTY_TOTAL_DURATION
              value: "${BURSTY_TOTAL_DURATION}"
            - name: BURSTY_ITERATIONS
              value: "${BURSTY_ITERATIONS}"
            - name: DIURNAL_BASE_RPS
              value: "${DIURNAL_BASE_RPS}"
            - name: DIURNAL_PEAK_RPS
              value: "${DIURNAL_PEAK_RPS}"
            - name: DIURNAL_SPIKE_RPS
              value: "${DIURNAL_SPIKE_RPS}"
            - name: DIURNAL_TOTAL_HOURS
              value: "${DIURNAL_TOTAL_HOURS}"
            - name: ROTATING_CYCLES
              value: "${ROTATING_CYCLES}"
            - name: ROTATING_STEADY_RPS
              value: "${ROTATING_STEADY_RPS}"
            - name: ROTATING_RAMP_PEAK_RPS
              value: "${ROTATING_RAMP_PEAK_RPS}"
            - name: ROTATING_SPIKE_RPS
              value: "${ROTATING_SPIKE_RPS}"
            - name: ROTATING_BURSTY_FLOOR
              value: "${ROTATING_BURSTY_FLOOR}"
            - name: ROTATING_BURSTY_CEILING
              value: "${ROTATING_BURSTY_CEILING}"
          resources:
            # Guaranteed QoS class: requests == limits on every
            # resource. Kubelet evicts BestEffort first, then
            # Burstable; Guaranteed pods are only evicted when
            # another Guaranteed pod needs the resource (which never
            # happens on a kind single-node demo cluster). This
            # eliminates the "Pod evicted by kubelet" failure mode
            # for the long-running scenarios.
            #
            # Memory: 2Gi is empirically sized for a 24h rotating
            # run at 200 RPS. k6's internal metric aggregation grows
            # ~50 MiB per hour of accumulated samples; over 24h that
            # is ~1.2 GiB of headroom inside the 2 GiB limit even
            # before counting the ~200 MiB resident for the 1,590-
            # stage schedule itself.
            #
            # CPU: 1 core matches k6's published recommendation for
            # 200-300 RPS arrival-rate executors. Bumping the request
            # to match the limit also pins the scheduler to a node
            # with a guaranteed core available, avoiding throttling
            # under burst load.
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        # Project the ConfigMap into a directory tree that matches the
        # k6/ source layout, so each scenario's `import "../lib/targets.js"`
        # resolves cleanly. ConfigMap keys can't contain slashes, so we
        # store flat-named keys and remap them via items[].path.
        - name: scripts
          configMap:
            name: k6-scripts
            items:
              - key: targets.js
                path: lib/targets.js
              - key: ramp.js
                path: scenarios/ramp.js
              - key: steady.js
                path: scenarios/steady.js
              - key: spiky.js
                path: scenarios/spiky.js
              - key: bursty.js
                path: scenarios/bursty.js
              - key: diurnal.js
                path: scenarios/diurnal.js
              - key: rotating.js
                path: scenarios/rotating.js
