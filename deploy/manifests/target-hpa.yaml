---
# app-hpa: identical workload managed by the standard HPA. The PodTemplate is
# byte-identical to target-agentic.yaml so observed differences in tail
# latency / 503 rate / replica trajectory are attributable solely to the
# autoscaler under test.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-hpa
  namespace: demo
  labels:
    app: app-hpa
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-hpa
  template:
    metadata:
      labels:
        app: app-hpa
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: target-app
          image: target-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: TARGET_PORT
              value: "8080"
            # Per-pod semaphore. Together with TARGET_WORK_DURATION_MS this
            # caps single-pod throughput at concurrency / work_duration ≈
            # 8 / 0.115s ≈ 70 RPS. The earlier value of 50 yielded ~435 RPS
            # per pod, which is so much higher than the load profiles that
            # neither autoscaler ever scaled past minReplicas — both targets
            # served identical traffic from identical replica counts and
            # produced bit-for-bit identical p99/5xx, hiding the predictive
            # advantage entirely. Keep TARGET_CONCURRENCY here in lockstep
            # with hpa.yaml's averageValue and the AgenticAutoscaler's
            # rpsPerPodMin/Max — see deploy/manifests/hpa.yaml's header.
            - name: TARGET_CONCURRENCY
              value: "8"
            - name: TARGET_WORK_DURATION_MS
              value: "100"
            - name: TARGET_WORK_JITTER_MS
              value: "30"
            # See target-agentic.yaml for the rationale; both manifests must
            # carry this env var so the deployment label is populated for
            # both halves of the agentic-vs-HPA comparison.
            - name: DEPLOYMENT_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['app']
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: app-hpa
  namespace: demo
  labels:
    app: app-hpa
spec:
  selector:
    app: app-hpa
  ports:
    - port: 80
      targetPort: http
      name: http
