---
# app-hpa: identical workload managed by the standard HPA. The PodTemplate is
# byte-identical to target-agentic.yaml so observed differences in tail
# latency / 503 rate / replica trajectory are attributable solely to the
# autoscaler under test.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-hpa
  namespace: demo
  labels:
    app: app-hpa
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-hpa
  template:
    metadata:
      labels:
        app: app-hpa
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: target-app
          image: target-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: TARGET_PORT
              value: "8080"
            - name: TARGET_CONCURRENCY
              value: "50"
            - name: TARGET_WORK_DURATION_MS
              value: "100"
            - name: TARGET_WORK_JITTER_MS
              value: "30"
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: app-hpa
  namespace: demo
  labels:
    app: app-hpa
spec:
  selector:
    app: app-hpa
  ports:
    - port: 80
      targetPort: http
      name: http
