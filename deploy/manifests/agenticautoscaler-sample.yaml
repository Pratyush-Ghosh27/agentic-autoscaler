---
# Sample AgenticAutoscaler CR managing app-agentic. All scaling-behaviour
# fields are intentionally left unset so the controller exercises the
# defer-to-classifier path; the operator can override any field at any
# time without restarting the controller.
#
# The kill-switch annotation is "false" by default — flip to "true" to
# pause reconciliation immediately (status.phase becomes Disabled).
apiVersion: autoscaling.agentic.io/v1alpha1
kind: AgenticAutoscaler
metadata:
  name: app-agentic
  namespace: demo
  annotations:
    autoscaling.agentic.io/kill-switch: "false"
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: app-agentic
  minReplicas: 2
  # HACKATHON OVERRIDE: 10 -> 20. The diurnal scenario peaks at
  # SPIKE=500 RPS during the lunch and PM spikes; with rpsPerPodMax=30
  # that needs ceil(500/30)=17 pods. The previous 10-pod cap saturated
  # BOTH scalers identically at the spike minutes, erasing AAS's
  # predictive advantage exactly when the demo most needs to show it.
  # Kept in lock-step with hpa.yaml so the comparison stays apples-to-
  # apples on the bound. To restore production defaults: drop back to 10.
  maxReplicas: 20
  # rpsPerPodMin/Max bracket the rps_per_pod target the classifier may
  # converge on. They are jointly tuned with target-*.yaml's
  # TARGET_CONCURRENCY=8 (per-pod capacity ~70 RPS) and hpa.yaml's
  # averageValue so the two scalers operate at the same per-pod target.
  #
  # HACKATHON-SEVEN OVERRIDE: 30/31 -> 40/41 to match hpa.yaml's
  # averageValue=40 (raised from 50 on hackathon-four). Equal per-pod
  # targets on both scalers ⇒ identical static headroom ⇒ residual
  # 503-rate gap isolates the forecaster's contribution to the
  # comparison. Without this, AAS had structural per-pod headroom
  # (rpsPerPodMin=30, 43% util) that HPA didn't (averageValue=50,
  # 71% util), confounding the predictive advantage with a
  # cost-tuning asymmetry.
  #
  # Why 40/41 and not 40/40: the validating webhook
  # (internal/webhook/v1alpha1/validator.go) enforces strict
  # `rpsPerPodMin < rpsPerPodMax` (the midpoint formula
  # `(min+max)/2` and the rpsPerPod clamp need a non-empty interval).
  # 40/41 is the tightest validator-legal pin to HPA's
  # averageValue=40. Replica math is identical at 40 vs 41 for every
  # RPS level the rotating demo hits.
  #
  # To restore the hackathon-four asymmetric tuning (HPA cost-tight,
  # AAS safety-margin): drop these back to 30/31 and restore
  # averageValue=50 in hpa.yaml.
  rpsPerPodMin: 40
  rpsPerPodMax: 41
  # preferredForecaster pins which forecaster the hot path uses. Leave
  # unset (or "auto") to defer to the classifier — recommended for most
  # workloads. The CRD enum is: prophet | linear_extrap | gbdt_quantile |
  # auto. Per design_v2.md §6.3 (F22) the auto path NEVER selects
  # gbdt_quantile; that forecaster is opt-in only. Pin it explicitly when
  # the workload has bursty / spike behaviour that quantile bands handle
  # better than Prophet's seasonality model.
  #
  # HACKATHON-SEVEN: un-pinned. On hackathon-four this was pinned to
  # `prophet` to guarantee the strongest forecaster for the diurnal/
  # rotating demos. That guarantee is itself an asymmetry: production
  # AAS users would leave it on "auto" and let the classifier pick
  # based on observed pattern. Removing the pin lets the classifier
  # exercise its auto path — on the rotating scenario it will almost
  # certainly converge on prophet anyway (the cycles are clearly
  # periodic), but the demo can now honestly claim the auto path
  # found the right forecaster on its own.
  #
  # To restore the hackathon-four hand-pinned forecaster: uncomment
  # the `preferredForecaster: prophet` line below.
  #
  # preferredForecaster: prophet
