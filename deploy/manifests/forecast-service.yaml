---
# Forecast Service: Python/FastAPI service serving /recommend.
# Memory limits sized for Prophet's compiled Stan models (kept in process
# memory after the warm-up fit) — see forecast-service/Dockerfile and
# Plan #7 for the warm-up rationale.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forecast-service
  namespace: agentic-system
  labels:
    app: forecast-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forecast-service
  template:
    metadata:
      labels:
        app: forecast-service
    spec:
      containers:
        - name: forecast-service
          image: forecast-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            # HACKATHON OVERRIDE: 10 -> 5 to halve forecast-vs-actual
            # error (autocorrelation decays with horizon). System still
            # has ~4 min of lookahead headroom before pod-startup,
            # cooldowns, and reaction time consume the window.
            - name: FORECAST_HORIZON_MINUTES
              value: "5"
            # HACKATHON OVERRIDE: 60 -> 15 so the auto-dispatch path
            # switches to Prophet within ~15 min of a fresh demo run
            # instead of ~60 min. Keeps the majority of a 25-min k6
            # scenario on Prophet rather than linear_extrap.
            - name: PROPHET_MIN_POINTS
              value: "15"
            # HACKATHON-SIX OVERRIDE: 5 -> 3. The varied scenario's
            # fast-wave component has a 17-min period and ±20 RPS
            # amplitude (~7.4 RPS/min peak slope). A 5-min linear-fit
            # window averages over ~30% of the fast wave's cycle,
            # which smooths the local slope estimate toward zero
            # exactly when the wave is mid-swing — producing visible
            # predicted-vs-actual lag on the dashboard during the
            # first 15 min before Prophet engages. 3 min captures
            # most of one fast-wave quarter-cycle (~4 min) so the
            # slope estimate stays close to the instantaneous rate.
            # Was 5 on hackathon and hackathon-two (sized for the
            # gentler ramp/diurnal slopes there).
            - name: LINEAR_EXTRAP_WINDOW_MINUTES
              value: "3"
            # HACKATHON ADDITION: 30 -> 10 lets gbdt_quantile engage at
            # ~15 min instead of ~40. Only fires when an AAS CR pins
            # spec.preferredForecaster: gbdt_quantile.
            - name: GBDT_MIN_POINTS
              value: "10"
            # HACKATHON-TWO ADDITION: disable Prophet's hour_baseline
            # regressor. The rotating-loop demo cycles every 2h28min;
            # the hour-of-day average therefore mixes steady, ramp,
            # spiky, and bursty traffic from different cycles. That
            # average looks ~steady regardless of the current phase
            # and pulls Prophet's prediction toward a flat midline
            # exactly when the actual is mid-ramp or mid-spike.
            # Disabling lets Prophet rely on its trend + changepoint
            # detection from the last HOT_PATH_HISTORY_MINUTES=30 of
            # data, which is what we want for this demo.
            - name: PROPHET_USE_HOURLY_REGRESSOR
              value: "false"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          # Warm-up takes ~25s on first start, so initialDelaySeconds is
          # generous; once warm, /healthz returns instantly.
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: forecast-service
  namespace: agentic-system
  labels:
    app: forecast-service
spec:
  selector:
    app: forecast-service
  ports:
    - port: 80
      targetPort: http
      name: http
