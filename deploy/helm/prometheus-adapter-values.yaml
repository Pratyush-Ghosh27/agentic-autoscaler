---
# prometheus-adapter values: expose `http_requests_per_second` as a Pods
# custom metric so the standard HPA in deploy/manifests/hpa.yaml can
# actually scale `app-hpa`.
#
# Without this, the HPA reports `FailedGetResourceMetric` and stays at
# minReplicas regardless of load — turning the agentic-vs-HPA comparison
# into a rigged win for the agentic side. See docs/gap-report-v1.md G4.

prometheus:
  # In-cluster Prometheus served by kube-prometheus-stack. The chart
  # creates a ClusterIP service named `kube-prom-kube-prometheus-prometheus`
  # in the `monitoring` namespace.
  url: http://kube-prom-kube-prometheus-prometheus.monitoring.svc
  port: 9090

# Disable the default rules; we provide our own focused rule for
# http_requests_per_second only. Keeping the rule list tight makes
# debugging "why does my HPA see no metric?" much easier.
rules:
  default: false
  custom:
    # Build `http_requests_per_second` (Pods custom metric) from the rate
    # of ALL incoming HTTP requests over a 1-minute window — no status
    # filter.
    #
    # HACKATHON-SIX FIX: the previous query filtered `status=~"2.."` to
    # avoid "the overload signal also being the scale-up signal", on the
    # rationale that an overload burst should not drive HPA to scale up
    # on the very 503s that prove the pod is overloaded. That rationale
    # creates a death spiral under sustained overload: pods 503 a
    # fraction of requests → adapter sees only the successful subset
    # → HPA reads a per-pod RPS BELOW its target → HPA decides pods are
    # under-loaded → never scales → pods keep 503ing → adapter keeps
    # under-reading. Empirically on a 2h soak: HPA stuck at 3 pods,
    # ~1.2M cumulative 503s, zero SuccessfulRescale events.
    #
    # Counting all statuses turns HPA into a demand-based reactive
    # scaler (what users actually expect), at the cost of HPA briefly
    # over-scaling during the 60-90s detection lag on a burst. That
    # lag IS the 503-gap window the demo is built to expose.
    - seriesQuery: 'http_requests_total{namespace!="",pod!=""}'
      resources:
        overrides:
          namespace: { resource: "namespace" }
          pod:       { resource: "pod" }
      name:
        matches: "^http_requests_total$"
        as: "http_requests_per_second"
      metricsQuery: |
        sum(rate(http_requests_total{<<.LabelMatchers>>}[1m])) by (<<.GroupBy>>)

# Keep resources small for kind / CI; bump in production.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
